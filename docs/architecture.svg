<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 240" role="img" aria-label="jwtlensのアーキテクチャ図" color="#768390">
  <title>jwtlensのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: currentColor; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #e8b04b; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: currentColor; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: currentColor; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #e8b04b; }
    .arrow { stroke: currentColor; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="currentColor"/>
    </marker>
  </defs>

  <rect x="20" y="70" width="170" height="100" rx="8" class="box"/>
  <text x="40" y="100" class="label">入力</text>
  <text x="40" y="124" class="small">JWT(貼り付け)</text>
  <text x="40" y="142" class="small">鍵(シークレット /</text>
  <text x="40" y="160" class="small">PEM / JWK)</text>

  <rect x="250" y="20" width="200" height="90" rx="8" class="box"/>
  <text x="270" y="48" class="label">lib/jwt + base64url</text>
  <text x="270" y="72" class="small">3セグメント分解と検査</text>
  <text x="270" y="90" class="small">JSONヘッダ・ペイロード復元</text>

  <rect x="250" y="135" width="200" height="90" rx="8" class="box"/>
  <text x="270" y="163" class="label">lib/keys</text>
  <text x="270" y="187" class="small">alg名をWebCrypto設定へ対応</text>
  <text x="270" y="205" class="small">PEM / JWK / シークレット判別</text>

  <rect x="510" y="20" width="180" height="90" rx="8" class="box"/>
  <text x="530" y="48" class="label">lib/claims</text>
  <text x="530" y="72" class="small">登録済みクレーム解説</text>
  <text x="530" y="90" class="small">exp / nbf / iat の判定</text>

  <rect x="510" y="135" width="180" height="90" rx="8" class="accent-box"/>
  <text x="530" y="163" class="accent-label">lib/verify</text>
  <text x="530" y="187" class="small">WebCrypto subtle.verify</text>
  <text x="530" y="205" class="small">HS / RS / PS / ES</text>

  <rect x="740" y="70" width="100" height="100" rx="8" class="box"/>
  <text x="758" y="100" class="label">表示</text>
  <text x="758" y="124" class="small">クレーム表</text>
  <text x="758" y="142" class="small">失効判定</text>
  <text x="758" y="160" class="small">検証結果</text>

  <path class="arrow" d="M190 100 H242 V72"/>
  <path class="arrow" d="M190 150 H242 V172"/>
  <path class="arrow" d="M450 65 H502"/>
  <path class="arrow" d="M450 180 H502"/>
  <path class="arrow" d="M690 65 H732 V92"/>
  <path class="arrow" d="M690 180 H732 V158"/>
</svg>
